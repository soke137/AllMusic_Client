name: Debug Build

on:
  workflow_dispatch:

jobs:
  debug_forge:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 25
      uses: actions/setup-java@v4
      with:
        java-version: '25'
        distribution: 'temurin'
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
    - name: Build
      shell: cmd
      run: |
        cd forge_1_20_1
        gradlew build
    - name: Debug - find jars
      shell: pwsh
      run: |
        Write-Host "=== All jar files in workspace ==="
        Get-ChildItem -Recurse -Filter "*.jar" | ForEach-Object {
          Write-Host $_.FullName
        }
    - name: Upload all jars for inspection
      uses: actions/upload-artifact@v4
      with:
        name: "all_jars_debug"
        path: "**/*.jar"