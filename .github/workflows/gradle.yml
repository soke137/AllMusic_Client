name: Java CI with Gradle

on:
  workflow_dispatch:
  push:
    branches:    
      - 'releases/**'
    tags:        
      - '*'

jobs:
  # ==================== Fabric 1.16.5 ====================
  build_fabric_1_16_5:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 25
      uses: actions/setup-java@v4
      with:
        java-version: '25'
        distribution: 'temurin'
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
    - name: Build
      shell: cmd
      run: |
        cd fabric_1_16_5
        gradlew build
    - name: Upload raw artifact
      uses: actions/upload-artifact@v4
      with:
        name: "build_output_fabric_1_16_5"
        path: client/target/
        if-no-files-found: warn

