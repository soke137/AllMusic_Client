# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.
# This workflow will build a Java project with Gradle and cache/restore any dependencies to improve the workflow execution time
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-java-with-gradle

name: Java CI with Gradle

on:
  workflow_dispatch:
  push:
    branches:    
      - 'releases/**'
    tags:        
      - '*'

jobs:
  # ==================== Fabric 1.16.5 ====================
  build_fabric_1_16_5:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 25
      uses: actions/setup-java@v4
      with:
        java-version: '25'
        distribution: 'temurin'
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
    - name: Build
      shell: cmd
      run: |
        cd fabric_1_16_5
        gradlew build
    - name: Find and upload artifact
      shell: pwsh
      run: |
        $jarFiles = Get-ChildItem -Path "fabric_1_16_5" -Recurse -Filter "*.jar" | Where-Object {
          $_.FullName -notlike "*-sources.jar" -and
          $_.FullName -notlike "*-dev.jar" -and
          $_.FullName -notlike "*original*.jar" -and
          $_.FullName -notlike "*gradle*" -and
          $_.FullName -like "*build*"
        }
        if ($jarFiles.Count -eq 0) { exit 1 }
        New-Item -ItemType Directory -Force -Path "$env:GITHUB_WORKSPACE\artifacts" -ErrorAction SilentlyContinue
        foreach ($jar in $jarFiles) {
          Copy-Item $jar.FullName -Destination "$env:GITHUB_WORKSPACE\artifacts\" -Force
        }
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: "allmusic_client_fabric_1_16_5"
        path: artifacts/*.jar
        if-no-files-found: error
    - name: Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: artifacts/*.jar
        append_body: true
        fail_on_unmatched_files: false

