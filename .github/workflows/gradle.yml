        if-no-files-found: warn

  # ==================== 统一收集并发布 ====================
  publish:
    runs-on: ubuntu-latest
    needs: [build_fabric_1_16_5, build_fabric_1_20_1, build_fabric_1_21, build_fabric_1_21_6, build_fabric_1_21_11, build_fabric_26_1, build_forge_1_16_5, build_forge_1_20_1, build_neoforge_1_21]
    if: always()
    permissions:
      contents: write
    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: all_artifacts
    - name: Collect jar files
      shell: bash
      run: |
        mkdir -p release_jars
        find all_artifacts -name "*.jar" -type f | while read jar; do
          echo "Found: $jar"
          cp "$jar" release_jars/
        done
        echo "Total jars collected: $(ls release_jars | wc -l)"
    - name: Upload final artifacts
      uses: actions/upload-artifact@v4
      with:
        name: "allmusic_client_all_versions"
        path: release_jars/*.jar
    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: release_jars/*.jar
        append_body: true
        fail_on_unmatched_files: false